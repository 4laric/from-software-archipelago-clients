name: Test

on:
  pull_request:
  # PUSH GATE (2026-07-11). This used to fire on pull_request ONLY -- and agents push straight to
  # `main`, so it never ran. Three consecutive Windows build round-trips were burned on symbol names
  # (ItemLotParam_map, ITEMLOT_PARAM_ST, set_lot_item_id01..08) that this workflow would have caught
  # for free on a GitHub runner. Gate the branch people actually push to.
  push:
    branches: [main]
  # Manual kick. Actions is DISABLED BY DEFAULT ON FORKS and this repo is a fork of
  # fswap/from-software-archipelago-clients -- so the workflow read as `state: active` while having
  # literally never run (total_count: 0). Enabled 2026-07-12 after it let three broken builds through
  # to Alaric in a row. Keep a dispatch trigger so the gate can be re-proved without a dummy commit.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
        components: clippy, rustfmt
    - uses: Swatinem/rust-cache@v2

    # ORDER MATTERS (2026-07-12). These steps used to run fmt -> clippy -> build -> test, and every
    # step is fail-fast, so a style lint SKIPS the build. On the first run this repo ever did, that is
    # exactly what happened: `cargo fmt` failed, and clippy/build/test never executed -- while three
    # genuine compile errors sat on main (a stray brace, a dangling {gate} capture, and a call into
    # er_semver, which is not even a dependency). A gate that lets a compile error through because a
    # doc-comment bullet was misindented is not a gate.
    #
    # So: BUILD and TEST first. They answer "is main broken?" -- the question worth failing on.
    # Style runs after, and can still fail the job, but never masks a broken build again.
    - run: cargo build
    - run: cargo test -p er-codec -p er-semver -p er-logic

    - run: cargo fmt -- --check
    # RE-ARMED 2026-07-12. eldenring-archipelago had 44 accumulated lints -- the whole backlog of a crate
    # clippy had never once linted, because Actions is disabled by default on forks and this repo is one.
    # All 44 are now cleared, so clippy blocks again. It is a HARD gate: the debt got in precisely because
    # nothing was stopping it.
    - run: cargo clippy -- -D warnings
    - run: cargo clippy --features=profile -- -D warnings
